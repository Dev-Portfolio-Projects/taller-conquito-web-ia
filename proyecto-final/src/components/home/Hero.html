<section
  id="inicio"
  class="min-h-[calc(100vh-100px)] bg-white flex items-center pt-20"
>
  <div class="max-w-7xl mx-auto px-8 grid md:grid-cols-2 gap-16 items-center">
    <div class="animate-slide">
      <h1 class="text-4xl md:text-5xl leading-tight font-semibold text-[#111]">
        Una nueva forma de descubrir el café
      </h1>

      <p class="mt-6 text-black/60 max-w-md leading-relaxed">
        Seleccionamos granos únicos de productores ecuatorianos para crear
        experiencias auténticas.
      </p>

      <div class="mt-8 flex gap-4">
        <a
          href="#catalogo"
          class="primary-button group flex items-center gap-2"
        >
          <i
            data-lucide="coffee"
            class="w-4 h-4 stroke-[1.8] group-hover:rotate-12 transition"
          ></i>

          <span>Explorar cafés</span>
        </a>
      </div>
    </div>

    <div class="relative animate-float flex justify-center items-center">
      <div
        class="absolute top-10 right-10 w-24 h-24 rounded-full bg-[#A8C7D9]/30 blur-2xl"
      ></div>

      <img
        src="/src/assets/cafeteria.webp"
        alt="Persona disfrutando café"
        class="relative z-10 w-[420px] h-[420px] object-contain drop-shadow-2xl"
      />

      <div
        class="absolute bottom-8 left-0 z-20 bg-white shadow-xl rounded-2xl px-6 py-4 max-w-xs"
      >
        <p class="text-sm font-semibold flex items-center gap-2 mt-1">
          <i data-lucide="coffee" class="w-4 h-4 text-[#8A9A5B]"></i>

          Café de especialidad
        </p>

        <div id="quote-container" class="mt-3 text-xs text-black/60 italic">
          Cargando inspiración...
        </div>
      </div>
    </div>
  </div>
</section>
