<section
  id="catalogo"
  class="min-h-[calc(100vh-100px)] bg-[#FAF9F6] flex items-start pt-20 px-8"
>
  <div class="max-w-7xl mx-auto w-full">
    <div
      class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-6"
    >
      <div>
        <h1 class="text-3xl md:text-4xl font-semibold text-black">
          Nuestros cafés
        </h1>

        <p class="text-sm text-black/50 mt-3 max-w-md leading-relaxed">
          Explora cafés de especialidad seleccionados desde distintos orígenes.
        </p>
      </div>

      <div
        class="bg-white rounded-2xl shadow-sm border border-black/5 p-3 flex flex-col sm:flex-row gap-3"
      >
        <div class="relative">
          <i
            data-lucide="search"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-black/40"
          ></i>

          <input
            id="search-coffee"
            type="search"
            placeholder="Buscar café..."
            class="w-full sm:w-60 rounded-full border border-black/10 pl-10 pr-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#8A9A5B]"
          />
        </div>

        <div class="relative">
          <i
            data-lucide="globe-2"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-black/40 pointer-events-none"
          ></i>

          <select
            id="origin-filter"
            class="appearance-none rounded-full border border-black/10 pl-10 pr-8 py-2.5 text-sm bg-white outline-none focus:ring-2 focus:ring-[#8A9A5B] cursor-pointer"
          >
            <option value="Todos">Todos los orígenes</option>
            <option value="Ecuador">Ecuador</option>
            <option value="Colombia">Colombia</option>
            <option value="Brasil">Brasil</option>
            <option value="Etiopía">Etiopía</option>
          </select>
        </div>
      </div>
    </div>

    <div
      id="coffee-list"
      class="mt-8 grid sm:grid-cols-2 lg:grid-cols-4 gap-5"
    ></div>
  </div>
</section>
